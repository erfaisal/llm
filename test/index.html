<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI API Tester (Free Tiers)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 600px;
            width: 100%;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background-color: var(--accent);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .flex-row > div {
            flex: 1;
        }

        .flex-row button {
            flex: 0 0 auto;
            width: auto;
            margin-top: 0;
            padding: 10px 16px;
        }

        #output {
            margin-top: 20px;
            padding: 16px;
            border-radius: 6px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            min-height: 100px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.5;
            display: none;
        }

        .error-text { color: var(--error); }
        .success-text { color: var(--success); }
        
        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .flex-row {
                flex-direction: column;
                align-items: stretch;
            }
            .flex-row button {
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>API Tester (Free Tiers)</h2>

    <div class="form-group">
        <label for="provider">Select Provider</label>
        <select id="provider" onchange="handleProviderChange()">
            <option value="groq">Groq</option>
            <option value="openrouter">OpenRouter</option>
            <option value="google">Google Gemini</option>
        </select>
    </div>

    <div class="form-group flex-row">
        <div>
            <label for="apiKey">API Key</label>
            <input type="password" id="apiKey" placeholder="Enter API Key">
        </div>
        <button id="fetchBtn" onclick="fetchModels()">Fetch Models</button>
    </div>

    <div class="form-group">
        <label for="modelSelect">Available Models</label>
        <select id="modelSelect">
            <option value="">-- Fetch models first --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="prompt">Test Prompt</label>
        <textarea id="prompt" rows="3">Hello! Please reply with a short greeting and confirm you are working.</textarea>
    </div>

    <button id="testBtn" onclick="testAPI()">Test API</button>

    <div id="output"></div>
</div>

<script>
    // Configs for the 3 providers
    const config = {
        groq: {
            modelsUrl: 'https://api.groq.com/openai/v1/models',
            chatUrl: 'https://api.groq.com/openai/v1/chat/completions',
            authType: 'Bearer'
        },
        openrouter: {
            modelsUrl: 'https://openrouter.ai/api/v1/models',
            chatUrl: 'https://openrouter.ai/api/v1/chat/completions',
            authType: 'Bearer'
        },
        google: {
            modelsUrl: 'https://generativelanguage.googleapis.com/v1beta/models',
            // Note: chat url for google requires appending the model name directly in the path
            chatUrlBase: 'https://generativelanguage.googleapis.com/v1beta/',
            authType: 'Query' // ?key=...
        }
    };

    // Initialize: load saved key if exists
    document.addEventListener('DOMContentLoaded', () => {
        handleProviderChange();
    });

    function handleProviderChange() {
        const provider = document.getElementById('provider').value;
        const savedKey = localStorage.getItem(`${provider}_key`);
        document.getElementById('apiKey').value = savedKey || '';
        document.getElementById('modelSelect').innerHTML = '<option value="">-- Fetch models first --</option>';
        hideOutput();
    }

    function showOutput(text, isError = false) {
        const outputEl = document.getElementById('output');
        outputEl.style.display = 'block';
        outputEl.className = isError ? 'error-text' : '';
        outputEl.innerText = text;
    }

    function hideOutput() {
        document.getElementById('output').style.display = 'none';
    }

    async function fetchModels() {
        const providerStr = document.getElementById('provider').value;
        const apiKey = document.getElementById('apiKey').value.trim();
        const fetchBtn = document.getElementById('fetchBtn');
        const modelSelect = document.getElementById('modelSelect');

        if (!apiKey) return showOutput("Error: API Key is required.", true);

        // Save key locally for convenience
        localStorage.setItem(`${providerStr}_key`, apiKey);

        fetchBtn.disabled = true;
        fetchBtn.innerText = "Loading...";
        showOutput("Fetching models...", false);

        const apiConf = config[providerStr];
        let url = apiConf.modelsUrl;
        let headers = { 'Content-Type': 'application/json' };

        if (apiConf.authType === 'Bearer') {
            headers['Authorization'] = `Bearer ${apiKey}`;
        } else if (apiConf.authType === 'Query') {
            url += `?key=${apiKey}`;
        }

        try {
            const response = await fetch(url, { method: 'GET', headers: headers });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || JSON.stringify(data));
            }

            // Extract models based on provider structure
            let models = [];
            if (providerStr === 'google') {
                // Google returns { models: [...] } and we only want models that generate content
                models = data.models
                    .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                    .map(m => m.name); 
            } else {
                // OpenRouter & Groq return { data: [...] } OpenAI style
                models = data.data.map(m => m.id);
            }

            // Populate Dropdown
            modelSelect.innerHTML = '';
            models.forEach(model => {
                const opt = document.createElement('option');
                opt.value = model;
                opt.textContent = model.replace('models/', ''); // Clean up google names visually
                modelSelect.appendChild(opt);
            });

            showOutput(`Success: Loaded ${models.length} models.`, false);
        } catch (error) {
            showOutput(`Failed to fetch models:\n${error.message}`, true);
        } finally {
            fetchBtn.disabled = false;
            fetchBtn.innerText = "Fetch Models";
        }
    }

    async function testAPI() {
        const providerStr = document.getElementById('provider').value;
        const apiKey = document.getElementById('apiKey').value.trim();
        const model = document.getElementById('modelSelect').value;
        const prompt = document.getElementById('prompt').value.trim();
        const testBtn = document.getElementById('testBtn');

        if (!apiKey) return showOutput("Error: API Key is required.", true);
        if (!model) return showOutput("Error: Please fetch and select a model first.", true);
        if (!prompt) return showOutput("Error: Prompt cannot be empty.", true);

        testBtn.disabled = true;
        testBtn.innerText = "Generating...";
        showOutput("Waiting for response...", false);

        const apiConf = config[providerStr];
        let url = apiConf.chatUrl;
        let headers = { 'Content-Type': 'application/json' };
        let body = {};

        // Construct Request based on Provider
        if (providerStr === 'google') {
            // Google specific formatting
            url = `${apiConf.chatUrlBase}${model}:generateContent?key=${apiKey}`;
            body = {
                contents: [{ parts: [{ text: prompt }] }]
            };
        } else {
            // OpenRouter / Groq (OpenAI Compatible) formatting
            headers['Authorization'] = `Bearer ${apiKey}`;
            // Recommended headers for OpenRouter
            if(providerStr === 'openrouter'){
                headers['HTTP-Referer'] = window.location.href;
                headers['X-Title'] = 'API Tester UI';
            }
            body = {
                model: model,
                messages: [{ role: "user", content: prompt }]
            };
        }

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify(body)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || JSON.stringify(data.error) || 'Unknown API Error');
            }

            // Extract Response Text
            let responseText = "";
            if (providerStr === 'google') {
                responseText = data.candidates[0].content.parts[0].text;
            } else {
                responseText = data.choices[0].message.content;
            }

            showOutput(responseText, false);
        } catch (error) {
            showOutput(`API Error:\n${error.message}`, true);
        } finally {
            testBtn.disabled = false;
            testBtn.innerText = "Test API";
        }
    }
</script>

</body>
</html>
